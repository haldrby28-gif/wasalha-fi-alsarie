
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات | وصلها في السريع</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        body{
            margin:0;
            background:#f5f5f5;
            font-family:Arial,sans-serif;
        }

        header{
            background:#ff6b00;
            color:#fff;
            padding:18px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        #notificationsContainer{
            padding:15px;
        }

        .notification{
            background:#fff;
            border-radius:12px;
            padding:15px;
            margin-bottom:15px;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

        .notification h3{
            margin:0 0 10px;
            color:#ff6b00;
        }

        .notification p{
            margin:6px 0;
            color:#444;
        }

        .notification small{
            color:#888;
        }

        .empty{
            text-align:center;
            color:#888;
            margin-top:40px;
            font-size:18px;
        }
    </style>
</head>

<body>

<header>
🔔 الإشعارات
</header>

<div id="notificationsContainer">

<div class="empty">
جاري تحميل الإشعارات...
</div>

</div>

<script type="module" src="../js/notifications.js"></script>

</body>
</html>
