<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - وصلها</title>
    <!-- يمكنك إضافة رابط ملف الـ CSS الخاص بك هنا -->
</head>
<body>

    <div class="login-container">
        <h2>تسجيل الدخول</h2>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        
        <!-- عند الضغط على هذا الزر، يتم استدعاء الدالة validateLogin الموجودة في ملف login.js -->
        <button onclick="validateLogin()">دخول</button>
    </div>

    <!-- استدعاء ملف الجافاسكريبت الخاص بتسجيل الدخول -->
    <!-- تأكد أن المسار يطابق مكان وجود ملف login.js في مشروعك -->
    <script type="module" src="js/app/login.js"></script>

</body>
</html>
