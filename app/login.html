
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وصلها في السريع - تسجيل الدخول</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ff6b00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
width:90%;
max-width:400px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#ff6b00;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ff6b00;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e85f00;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#ff6b00;
text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">

<h1>وصلها في السريع</h1>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn">تسجيل الدخول</button>

<p>
ليس لديك حساب؟
<a href="#">إنشاء حساب</a>
</p>

</div>

</body>
</html>
