<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - وصلها في السريع</title>
    <style>
        body {
            background-color: #ff8c00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #ff8c00; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .register-link { margin-top: 15px; color: #555; }
        .register-link a { color: #ff8c00; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>وصلها في السريع</h2>
        <p>سجل الدخول للمتابعة</p>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        
        <button onclick="validateLogin()">تسجيل الدخول</button>
        
        <div class="register-link">
            ليس لديك حساب؟ <a href="register.html">سجل الآن</a>
        </div>
    </div>

    <!-- استدعاء ملف الـ JS الخاص بتسجيل الدخول -->
    <script type="module" src="js/app/login.js"></script>
</body>
</html>
