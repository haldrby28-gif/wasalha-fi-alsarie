<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وصلها في السريع | تسجيل الدخول</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff7a00, #ff9800);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
    }

    h1 {
      text-align: center;
      color: #ff6b00;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #ff6b00;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #e55f00;
    }

    .register {
      text-align: center;
      margin-top: 20px;
    }

    .register a {
      color: #ff6b00;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>وصلها في السريع</h1>
    <p>سجل الدخول للمتابعة</p>

    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="validateLogin()">تسجيل الدخول</button>

    <!-- في ملف login.html -->
<div class="register">
  ليس لديك حساب؟ <a href="register.html">سجل الآن</a>
</div>

  <script>
    function validateLogin() {
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;

      // تحقق بسيط
      if (email === "" || password === "") {
        alert("يرجى ملء جميع الحقول");
      } else if (email === "admin@test.com" && password === "1234") {
        alert("تم تسجيل الدخول بنجاح!");
        // تأكد من إنشاء صفحة home.html لاحقاً
        window.location.href = "home.html"; 
      } else {
        alert("البريد الإلكتروني أو كلمة المرور غير صحيحة");
      }
    }
  </script>

</body>
</html>
