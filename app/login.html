<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وصلها في السريع | تسجيل الدخول</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff7a00, #ff9800);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
    }

    h1 {
      text-align: center;
      color: #ff6b00;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #ff6b00;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #e55f00;
    }

    .register {
      text-align: center;
      margin-top: 20px;
    }

    .register a {
      color: #ff6b00;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>وصلها في السريع</h1>
    <p>سجل الدخول للمتابعة</p>

    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="validateLogin()">تسجيل الدخول</button>

    <!-- في ملف login.html -->
<div class="register">
  ليس لديك حساب؟ <a href="register.html">سجل الآن</a>
</div>

  <script type="module">
  // استيراد auth من ملف الإعدادات الذي أنشأناه
  import { auth } from "./firebase/firebase-config.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

  window.validateLogin = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("تم تسجيل الدخول بنجاح!");
      window.location.href = "home.html";
    } catch (error) {
      alert("خطأ: تأكد من الإيميل وكلمة المرور.");
    }
  };
</script>

</body>
</html>
