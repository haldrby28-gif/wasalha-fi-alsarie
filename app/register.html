<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - وصلها في السريع</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#ff8c00;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:90%;
            max-width:420px;
            background:#fff;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h2{
            color:#ff8c00;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#ff8c00;
            color:#fff;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#e67e22;
        }

        #otp,
        #registerBtn{
            display:none;
        }

        #message{
            margin-top:15px;
            color:#ff8c00;
            font-size:15px;
        }

        .login-link{
            margin-top:20px;
        }

        .login-link a{
            color:#ff8c00;
            text-decoration:none;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

<h2>إنشاء حساب جديد</h2>

<input
id="name"
type="text"
placeholder="الاسم الكامل"
required>

<input
id="phone"
type="tel"
placeholder="+201001234567"
required>

<input
id="otp"
type="text"
placeholder="رمز التحقق">

<button id="sendCodeBtn">
إرسال رمز التحقق
</button>

<button id="registerBtn">
إنشاء الحساب
</button>

<div id="message"></div>

<div id="recaptcha-container"></div>

<div class="login-link">
لديك حساب؟
<a href="login.html">تسجيل الدخول</a>
</div>

</div>

<script type="module" src="../js/app/register.js"></script>

</body>

</html>
