<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب - وصلها في السريع</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ff6b00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:400px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#ff6b00;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ff6b00;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

p{
margin-top:15px;
text-align:center;
}

a{
color:#ff6b00;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>إنشاء حساب جديد</h2>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button id="registerBtn">
إنشاء الحساب
</button>

<p>
لديك حساب؟
<a href="login.html">تسجيل الدخول</a>
</p>

</div>

<script type="module" src="../js/register.js"></script>

</body>
</html>
