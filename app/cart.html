<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السلة - وصلها في السريع</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
}

h2{
text-align:center;
margin-bottom:20px;
}

#cartItems{
margin-bottom:20px;
}

.cart-item{
background:#fff;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.summary{
background:#fff;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:10px 0;
}

input,
textarea,
button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#ff6b00;
color:#fff;
border:none;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

</style>

</head>

<body>

<h2>🛒 السلة</h2>

<div id="cartItems"></div>

<div class="summary">

<p>

<span>الإجمالي</span>

<strong id="subtotal">0 ج.م</strong>

</p>

<p>

<span>رسوم التوصيل</span>

<strong id="deliveryFee">20 ج.م</strong>

</p>

<p>

<span>الخصم</span>

<strong id="discount">0 ج.م</strong>

</p>

<hr>

<p>

<span>الإجمالي النهائي</span>

<strong id="total">20 ج.م</strong>

</p>

</div>

<h3>عنوان التوصيل</h3>

<input
type="text"
id="address"
placeholder="اكتب عنوان التوصيل">

<h3>كود الخصم</h3>

<input
type="text"
id="couponCode"
placeholder="أدخل كود الخصم">

<button id="applyCoupon">

تطبيق الكوبون

</button>

<h3>ملاحظات</h3>

<textarea
id="notes"
rows="4"
placeholder="ملاحظات للمندوب (اختياري)">
</textarea>

<button id="checkoutBtn">

تأكيد الطلب

</button>

<script type="module" src="../js/cart.js"></script>

</body>

</html>
