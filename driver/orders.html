<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل الطلب</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

button{

width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:10px;

}

.finish{

background:#28a745;
color:white;

}

.back{

background:#666;
color:white;

}

</style>

</head>

<body>

<header>

📦 تفاصيل الطلب

</header>

<div class="container">

<div id="orderInfo"></div>

<button
class="finish"
id="finishBtn">

✅ تم التسليم

</button>

<button
class="back"
onclick="history.back()">

رجوع

</button>

</div>

<script type="module" src="../js/driver/order.js"></script>

</body>

</html>
