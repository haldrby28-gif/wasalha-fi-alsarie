<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الرئيسية - المندوب</title>

<link rel="stylesheet" href="../css/style.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
padding-bottom:80px;
}

header{
background:#ff6b00;
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.driver-card{

background:#fff;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.driver-card h2{
margin:0;
}

.status{

margin-top:10px;
font-size:18px;
font-weight:bold;

}

.orders{

padding:15px;

}

.orders h2{

margin-top:0;

}

.order-card{

background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.order-card h3{

margin-top:0;
margin-bottom:10px;

}

.order-card p{

margin:8px 0;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff6b00;
color:#fff;
font-size:16px;
cursor:pointer;
margin-top:10px;

}

button:hover{

background:#e45d00;

}

.bottom-nav{

position:fixed;
bottom:0;
right:0;
left:0;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
