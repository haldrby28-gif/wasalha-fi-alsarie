<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<title>الرئيسية - المندوب</title>

<link rel="stylesheet" href="../css/style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding-bottom:80px;
}

header{
    background:#ff6b00;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.driver-card{
    background:#fff;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.driver-card h2{
    margin-bottom:10px;
}

.status{
    font-size:18px;
    font-weight:bold;
}

.orders{
    padding:15px;
}

.orders h2{
    margin-bottom:15px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin:8px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff6b00;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#e45d00;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    right:0;
    left:0;
    height:65px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 8px rgba(0,0,0,.1);
}

.bottom-nav a{
    color:#555;
    text-decoration:none;
    font-size:14px;
    text-align:center;
}

.bottom-nav a.active{
    color:#ff6b00;
}
</style>

</head>

<body>

<header>
🚴 لوحة المندوب
</header>

<div class="driver-card">

<h2 id="driverName">
جارٍ التحميل...
</h2>

<div class="status" id="driverStatus">
...
</div>

</div>

<section class="orders">

<h2>
الطلبات الجاهزة
</h2>

<div id="ordersContainer">

<p style="text-align:center">
جارٍ تحميل الطلبات...
</p>

</div>

</section>

<a href="home.html" class="active">

</html>
