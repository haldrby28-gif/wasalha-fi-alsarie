<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل دخول المندوب</title>

<link rel="stylesheet" href="../app/style.css">

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    width:90%;
    max-width:400px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#ff6b00;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#ff6b00;
    color:#fff;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل دخول المندوب</h2>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني">

<input
type="password"
id="password"
placeholder="كلمة المرور">

<button id="loginBtn">
تسجيل الدخول
</button>

<p id="error"></p>

</div>

<script type="module" src="../js/driver/login.js"></script>

</body>
</html>
