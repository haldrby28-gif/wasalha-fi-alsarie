<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة | وصلها في السريع</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
width:95%;
max-width:420px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.logo{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
margin-bottom:5px;
color:#ff6b00;
}

p{
text-align:center;
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e55f00;
}

.error{
margin-top:15px;
color:red;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<div class="login-card">

<div class="logo">🛵</div>

<h1>لوحة الإدارة</h1>

<p>وصلها في السريع</p>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني">

<input
type="password"
id="password"
placeholder="كلمة المرور">

<button id="adminLogin">
دخول الإدارة
</button>

<div class="error" id="error"></div>

</div>

<script type="module" src="js/admin-auth.js"></script>

</body>
</html>
