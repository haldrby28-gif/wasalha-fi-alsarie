<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الكوبونات</title>

<link rel="stylesheet" href="../css/admin.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

input,
select,
button{

width:100%;

padding:12px;

margin:8px 0;

border-radius:8px;

border:1px solid #ddd;

font-size:16px;

}

button{

background:#ff6b00;

color:white;

border:none;

cursor:pointer;

}

button:hover{

background:#e65c00;

}

table{

width:100%;

margin-top:20px;

background:white;

border-collapse:collapse;

}

th,td{

padding:12px;

border:1px solid #ddd;

text-align:center;

}

th{

background:#ff6b00;

color:white;

}

.action-btn{

padding:6px 10px;

margin:2px;

border:none;

border-radius:6px;

cursor:pointer;

}

.delete{

background:#e53935;

color:white;

}

.edit{

background:#1976d2;

color:white;

}

</style>

</head>

<body>

<header>

🎟️ إدارة الكوبونات

</header>

<div class="container">

<input
type="text"
id="code"
placeholder="كود الكوبون">

<input
type="number"
id="discount"
placeholder="قيمة الخصم">

<select id="type">

<option value="percent">
نسبة مئوية %
</option>

<option value="fixed">
مبلغ ثابت
</option>

</select>

<input
type="number"
id="minimumOrder"
placeholder="الحد الأدنى للطلب">

<input
type="number"
id="usageLimit"
placeholder="عدد مرات الاستخدام">

<input
type="date"
id="expireDate">

<button id="saveCoupon">

➕ إضافة كوبون

</button>

<table>

<thead>

<tr>

<th>الكود</th>

<th>الخصم</th>

<th>النوع</th>

<th>الاستخدام</th>

<th>الحالة</th>

<th>العمليات</th>

</tr>

</thead>

<tbody id="couponsTable">

</tbody>

</table>

</div>

<script type="module" src="../js/admin/coupons.js"></script>

<script type="module" src="../js/auth-guard.js"></script>

</body>

</html>
