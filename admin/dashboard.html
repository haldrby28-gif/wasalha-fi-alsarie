<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<link rel="stylesheet" href="../css/admin.css">

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#f5f5f5;

}

header{

background:#ff6b00;

color:#fff;

padding:18px;

text-align:center;

font-size:24px;

font-weight:bold;

}

.container{

width:95%;

margin:20px auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.card{

background:#fff;

padding:20px;

border-radius:12px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

text-align:center;

}

.card h2{

font-size:18px;

margin-bottom:10px;

}

.card p{

font-size:32px;

font-weight:bold;

color:#ff6b00;

margin:0;

}

</style>

</head>

<body>

<header>

📊 لوحة الإحصائيات

</header>

<div class="container">

<div class="card">

<h2>👥 المستخدمون</h2>

<p id="usersCount">0</p>

</div>

<div class="card">

<h2>🍽️ المطاعم</h2>

<p id="restaurantsCount">0</p>

</div>

<div class="card">

<h2>🛵 المندوبون</h2>

<p id="driversCount">0</p>

</div>

<div class="card">

<h2>📦 الطلبات</h2>

<p id="ordersCount">0</p>

</div>

<div class="card">

<h2>💰 المبيعات</h2>

<p id="sales">0</p>

</div>

</div>

<script type="module" src="../js/admin/dashboard.js"></script>

<script type="module" src="../js/auth-guard.js"></script>

</body>

</html>
