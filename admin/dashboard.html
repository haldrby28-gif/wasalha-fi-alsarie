
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - وصلها في السريع</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:#fff;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:18px;
margin-bottom:10px;
}

.number{
font-size:32px;
font-weight:bold;
color:#ff6b00;
}

.menu{
margin:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.menu a{
background:#fff;
padding:15px;
text-decoration:none;
color:#333;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-weight:bold;
}
</style>

</head>

<body>

<header>
لوحة إدارة وصلها في السريع
</header>

<div class="container">

<div class="card">
<h2>المستخدمون</h2>
<div class="number" id="usersCount">0</div>
</div>

<div class="card">
<h2>المطاعم</h2>
<div class="number" id="restaurantsCount">0</div>
</div>

<div class="card">
<h2>الطلبات</h2>
<div class="number" id="ordersCount">0</div>
</div>

<div class="card">
<h2>المندوبون</h2>
<div class="number" id="driversCount">0</div>
</div>

</div>

<div class="menu">

<a href="restaurants.html">🍔 إدارة المطاعم</a>

<a href="products.html">🍕 إدارة المنتجات</a>

<a href="orders.html">📦 إدارة الطلبات</a>

<a href="users.html">👥 المستخدمون</a>

<a href="drivers.html">🛵 المندوبون</a>

<a href="settings.html">⚙️ الإعدادات</a>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
