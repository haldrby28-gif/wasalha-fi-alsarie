<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الطلبات</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#ff6b00;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

th{
background:#ff6b00;
color:#fff;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fafafa;
}

select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<header>
إدارة الطلبات
</header>

<div class="container">

<table>

<thead>

<tr>

<th>رقم الطلب</th>
<th>العميل</th>
<th>المطعم</th>
<th>الإجمالي</th>
<th>الحالة</th>
<th>تحديث</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

<script type="module" src="../js/orders.js"></script>
<script type="module" src="../js/auth-guard.js"></script>

</body>

</html>
