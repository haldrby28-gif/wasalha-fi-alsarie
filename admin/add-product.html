<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة منتج</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
إضافة منتج جديد
</header>

<div class="container">

<input id="name" placeholder="اسم المنتج">

<textarea id="description" placeholder="وصف المنتج"></textarea>

<input id="price" type="number" placeholder="السعر">

<label>اختر المطعم</label>

<select id="restaurantId">
<option value="">جاري تحميل المطاعم...</option>
</select>

<select id="available">
<option value="true">متوفر</option>
<option value="false">غير متوفر</option>
</select>

<button id="saveProduct">
حفظ المنتج
</button>

</div>

<script type="module" src="js/add-product.js"></script>
<script type="module" src="js/add-product.js"></script>
<script type="module" src="js/auth-guard.js"></script>

</body>
</html>
</body>
</html>
