<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إدارة المستخدمين</title>

    <link rel="stylesheet" href="../css/admin.css">

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        header{
            background:#ff6b00;
            color:#fff;
            padding:18px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        .container{
            width:95%;
            margin:20px auto;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            gap:10px;
            flex-wrap:wrap;
        }

        #searchUser{
            flex:1;
            min-width:220px;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#fff;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        th{
            background:#ff6b00;
            color:white;
            padding:15px;
        }

        td{
            padding:14px;
            border-bottom:1px solid #eee;
            text-align:center;
        }

        tr:hover{
            background:#fafafa;
        }

        .status{
            padding:6px 10px;
            border-radius:8px;
            color:white;
            font-size:14px;
            font-weight:bold;
        }

        .active{
            background:#4CAF50;
        }

        .inactive{
            background:#F44336;
        }

        button{
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin:2px;
        }

        .edit{
            background:#2196F3;
            color:white;
        }

        .delete{
            background:#F44336;
            color:white;
        }

        .toggle{
            background:#4CAF50;
            color:white;
        }

    </style>

</head>

<body>

<header>

👥 إدارة المستخدمين

</header>

<div class="container">

    <div class="top-bar">

        <input
            type="text"
            id="searchUser"
            placeholder="🔍 البحث عن مستخدم">

    </div>

    <table id="usersTable">

        <thead>

            <tr>

                <th>الاسم</th>

                <th>البريد الإلكتروني</th>

                <th>الدور</th>

                <th>الحالة</th>

                <th>الإجراءات</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>

<script type="module" src="../js/admin/users.js"></script>

<script type="module" src="../js/auth-guard.js"></script>

</body>

</html>
