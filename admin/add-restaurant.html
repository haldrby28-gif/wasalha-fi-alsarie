<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة مطعم</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 12px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:15px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e55d00;
}
</style>

</head>

<body>

<header>
إضافة مطعم جديد
</header>

<div class="container">

<input id="name" placeholder="اسم المطعم">

<textarea id="description" placeholder="وصف المطعم"></textarea>

<input id="category" placeholder="التصنيف">

<input id="deliveryTime" placeholder="مدة التوصيل">

<input id="deliveryFee" type="number" placeholder="رسوم التوصيل">

<input id="image" type="file" accept="image/*">

<select id="status">
<option value="true">مفتوح</option>
<option value="false">مغلق</option>
</select>

<button id="saveRestaurant">
حفظ المطعم
</button>

</div>

<script type="module" src="js/add-restaurant.js"></script>
<script type="module" src="js/add-restaurant.js"></script>
<script type="module" src="js/auth-guard.js"></script>

</body>
</html>
</body>
</html>
