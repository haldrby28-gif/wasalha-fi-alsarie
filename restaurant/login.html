<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تسجيل دخول المطعم</title>

    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <div class="login-container">

        <h2>🍽️ تسجيل دخول صاحب المطعم</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="البريد الإلكتروني"
                required>

            <input
                type="password"
                id="password"
                placeholder="كلمة المرور"
                required>

            <button type="submit">

                تسجيل الدخول

            </button>

        </form>

    </div>

    <script
        type="module"
        src="../js/restaurant/restaurant-auth.js">
    </script>

</body>

</html>
