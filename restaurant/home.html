<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>لوحة المطعم</title>

    <link rel="stylesheet" href="../style.css">

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        header{
            background:#ff6b00;
            color:#fff;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .container{
            padding:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .card{
            background:#fff;
            border-radius:12px;
            padding:20px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

        .card h3{
            margin:10px 0;
            color:#ff6b00;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
        }

        .menu{
            margin-top:30px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
        }

            border-radius:12px;
            text-align:center;
            color:#333;
            font-weight:bold;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }
