<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منتج</title>

<link rel="stylesheet" href="../style.css">

<style>

body{

font-family:Arial,sans-serif;

background:#f5f5f5;

margin:0;

}

header{

background:#ff6b00;

color:#fff;

padding:18px;

text-align:center;

font-size:24px;

}

.container{

max-width:600px;

margin:20px auto;

background:#fff;

padding:20px;

border-radius:10px;

box-shadow:0 2px 8px rgba(0,0,0,.1);

}

input,textarea,select{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;

padding:14px;

background:#ff6b00;

color:white;

border:none;

border-radius:8px;

font-size:18px;

cursor:pointer;

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:10px;

display:none;

margin-top:10px;

}

</style>

</head>

<body>

<header>

➕ إضافة منتج

</header>

<div class="container">

<form id="productForm">

<input
type="text"
id="name"
placeholder="اسم المنتج"
required>

<textarea
id="description"
placeholder="وصف المنتج"></textarea>

<input
type="number"
id="price"
placeholder="السعر"
required>

<input
type="text"
id="category"
placeholder="التصنيف">

<input
type="url"
id="image"
placeholder="رابط الصورة"
required>

<img id="preview">

<button type="submit">

حفظ المنتج

</button>

</form>

</div>

<script type="module" src="../js/restaurant/restaurant-add-product.js"></script>

<script>

const image=document.getElementById("image");

const preview=document.getElementById("preview");

image.addEventListener("input",()=>{

preview.src=image.value;

preview.style.display="block";

});

</script>

</body>

</html>
